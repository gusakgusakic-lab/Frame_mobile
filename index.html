        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqKZrJNcy-4hgZlkXbtLjBfTxY5I4-N7o",
            authDomain: "framework-5a0bf.firebaseapp.com",
            databaseURL: "https://framework-5a0bf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "framework-5a0bf",
            storageBucket: "framework-5a0bf.firebasestorage.app",
            messagingSenderId: "101596985169",
            appId: "1:101596985169:web:3474135d7496f5fa314570"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ADMIN_PHONE = '375292859316';
        let isLoginMode = true;
        let currentUser = null;
        let currentChatId = null;
        let usersCache = {}; 
        let messagesListener = null;

        const emojis = ['рҹҳҖ','рҹҳғ','рҹӨЈ','рҹҳҮ','рҹҘ°','рҹӨ‘','рҹӨ”','рҹӨҗ','рҹҘ¶','рҹҘө','рҹҘё','рҹӨ®','рҹҘі','рҹҳҲ','рҹӨ–','рҹ’©','рҹӨЎ','рҹҳә','рҹ–•','вңҢпёҸ','рҹ‘Җ','рҹҚҠ','рҹҚү','рҹҚҺ','рҹҘқ','рҹҚҚ','рҹҚҢ','рҹҚ“','рҹҚ’','рҹҚ‘','рҹҚҹ','рҹҚ•','рҹҚ”','рҹҢҚ','рҹ§ӯ','рҹҸ ','вңЁ','рҹҺү','рҹҺҒ','вҳўпёҸ','вҳҜпёҸ','вҷҲ','вҷҺ','рҹ”Ҷ','рҹ”ұ','вҷҖпёҸ','вҷӮпёҸ','вҡ•пёҸ','вҷҫпёҸ','вң”пёҸ','рҹ”°','вҷ»пёҸ','рҹҮ©рҹҮӘ','рҹҮІрҹҮ¬','рҹҮөрҹҮұ','рҹҮ·рҹҮҙ','рҹҮёрҹҮӘ','рҹҮ№рҹҮі','рҹҮҪрҹҮ°','рҹҮёрҹҮ©','рҹҮІрҹҮ°','рҹҮұрҹҮ№','рҹҮ¬рҹҮӘ','рҹҮҰрҹҮӘ', 'рҹ‘Ҙ', 'рҹ’¬', 'рҹ”Ҙ', 'рҹҸҶ', 'рҹҺ®', 'рҹ’Җ', 'рҹ‘Ҫ', 'рҹ‘»'];
        let selectedEmoji = 'рҹҳҖ'; let selectedGroupEmoji = 'рҹ‘Ҙ'; let selectedEditEmoji = 'рҹҳҖ';

        window.onload = () => { initAuth(); checkSession(); };

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        // === РҗР’РўРһР РҳР—РҗРҰРҳРҜ Рҳ РҹР РһРӨРҳРӣР¬ ===
        function initAuth() {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('emoji-picker').innerHTML = emojis.map(e => `<div class="text-3xl cursor-pointer p-1 emoji-btn flex-shrink-0 ${e === selectedEmoji ? 'emoji-selected' : ''}" onclick="selectEmoji('${e}', this, 'selectedEmoji', '#emoji-picker')">${e}</div>`).join('');
            document.getElementById('edit-emoji-picker').innerHTML = emojis.map(e => `<div class="text-3xl cursor-pointer p-1 emoji-btn flex-shrink-0" onclick="selectEmoji('${e}', this, 'selectedEditEmoji', '#edit-emoji-picker')">${e}</div>`).join('');
            document.getElementById('group-emoji-picker').innerHTML = emojis.map(e => `<div class="text-3xl cursor-pointer p-1 emoji-btn flex-shrink-0" onclick="selectEmoji('${e}', this, 'selectedGroupEmoji', '#group-emoji-picker')">${e}</div>`).join('');
        }

        function selectEmoji(e, element, varName, containerId) {
            window[varName] = e;
            document.querySelectorAll(`${containerId} .emoji-btn`).forEach(btn => btn.classList.remove('emoji-selected'));
            element.classList.add('emoji-selected');
        }

        function togglePassword(id, iconId) {
            const input = document.getElementById(id); const icon = document.getElementById(iconId);
            if(input.type === 'password'){ input.type='text'; icon.className='fas fa-eye-slash text-lg';}
            else { input.type='password'; icon.className='fas fa-eye text-lg'; }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Р’С…РҫРҙ' : 'Р РөРіРёСҒСӮСҖР°СҶРёСҸ';
            document.getElementById('auth-btn').innerText = isLoginMode ? 'Р’РҫР№СӮРё' : 'РЎРҫР·РҙР°СӮСҢ Р°РәРәР°СғРҪСӮ';
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? 'РқРөСӮ Р°РәРәР°СғРҪСӮР°? РЎРҫР·РҙР°СӮСҢ' : 'РЈР¶Рө РөСҒСӮСҢ Р°РәРәР°СғРҪСӮ? Р’РҫР№СӮРё';
            document.getElementById('nickname-block').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('emoji-block').style.display = isLoginMode ? 'none' : 'block';
        }

        function checkSession() {
            const saved = localStorage.getItem('framework_user_m');
            if (saved) { currentUser = JSON.parse(saved); startApp(); }
        }

        async function handleAuth() {
            const phone = document.getElementById('phone-input').value.trim();
            const pass = document.getElementById('password-input').value.trim();
            if(!phone || !pass) return alert('Р—Р°РҝРҫР»РҪРёСӮРө РІСҒРө РҝРҫР»СҸ');
            const btn = document.getElementById('auth-btn'); btn.disabled=true; btn.innerText='Р—Р°РіСҖСғР·РәР°...';

            try {
                const snap = await db.ref('users/' + phone).once('value');
                if (isLoginMode) {
                    if(!snap.exists() || snap.val().password !== pass) { btn.disabled=false; btn.innerText='Р’РҫР№СӮРё'; return alert('РқРөРІРөСҖРҪСӢР№ РҪРҫРјРөСҖ РёР»Рё РҝР°СҖРҫР»СҢ'); }
                    currentUser = snap.val();
                } else {
                    const nick = document.getElementById('nickname-input').value.trim();
                    if(!nick) { btn.disabled=false; btn.innerText='РЎРҫР·РҙР°СӮСҢ'; return alert('Р’РІРөРҙРёСӮРө РҪРёРәРҪРөР№Рј'); }
                    if(snap.exists()) { btn.disabled=false; btn.innerText='РЎРҫР·РҙР°СӮСҢ'; return alert('РқРҫРјРөСҖ Р·Р°РҪСҸСӮ'); }
                    currentUser = { phone, nickname: nick, password: pass, emoji: selectedEmoji, contacts: {} };
                    await db.ref('users/' + phone).set(currentUser);
                }
                localStorage.setItem('framework_user_m', JSON.stringify(currentUser));
                startApp();
            } catch(e) { alert('РһСҲРёРұРәР° СҒРөСӮРё'); btn.disabled=false; btn.innerText=isLoginMode?'Р’РҫР№СӮРё':'РЎРҫР·РҙР°СӮСҢ'; }
        }

        function logout() { localStorage.removeItem('framework_user_m'); location.reload(); }

        // РқР°СҒСӮСҖРҫР№РәРё РҝСҖРҫС„РёР»СҸ
        async function saveProfile() {
            const newNick = document.getElementById('edit-nick').value.trim();
            const oldP = document.getElementById('old-pass').value;
            const newP = document.getElementById('new-pass').value;
            const repP = document.getElementById('new-pass-repeat').value;

            if(!newNick) return alert('РқРёРәРҪРөР№Рј РҪРө РјРҫР¶РөСӮ РұСӢСӮСҢ РҝСғСҒСӮСӢРј');
            
            let updates = { nickname: newNick, emoji: selectedEditEmoji };

            if(oldP || newP || repP) {
                if(oldP !== currentUser.password) return alert('РўРөРәСғСүРёР№ РҝР°СҖРҫР»СҢ РҪРөРІРөСҖРөРҪ');
                if(newP !== repP) return alert('РқРҫРІСӢРө РҝР°СҖРҫР»Рё РҪРө СҒРҫРІРҝР°РҙР°СҺСӮ');
                if(newP.length < 3) return alert('РҹР°СҖРҫР»СҢ СҒР»РёСҲРәРҫРј РәРҫСҖРҫСӮРәРёР№');
                updates.password = newP;
            }

            await db.ref('users/' + currentUser.phone).update(updates);
            currentUser.nickname = newNick; currentUser.emoji = selectedEditEmoji;
            if(updates.password) currentUser.password = updates.password;
            
            localStorage.setItem('framework_user_m', JSON.stringify(currentUser));
            document.getElementById('my-nickname').innerText = currentUser.nickname;
            document.getElementById('my-avatar').innerText = currentUser.emoji;
            hideModal('settings-modal'); alert('РҹСҖРҫС„РёР»СҢ РҫРұРҪРҫРІР»РөРҪ!');
            
            // РһСҮРёСҒСӮРәР° РҝРҫР»РөР№
            document.getElementById('old-pass').value = ''; document.getElementById('new-pass').value=''; document.getElementById('new-pass-repeat').value='';
        }

        // === РҳРқРҳРҰРҳРҗРӣРҳР—РҗРҰРҳРҜ Рҳ РЎРўРҗРўРЈРЎР« ===
        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('my-avatar').innerText = currentUser.emoji;
            document.getElementById('my-nickname').innerText = currentUser.nickname;
            document.getElementById('my-phone').innerText = '+' + currentUser.phone;
            
            document.getElementById('edit-nick').value = currentUser.nickname;
            selectedEditEmoji = currentUser.emoji || 'рҹҳҖ';
            
            // РқР°СҒСӮСҖРҫР№РәР° СҖРөР°Р»СҢРҪРҫРіРҫ СҒСӮР°СӮСғСҒР°
            const myOnlineRef = db.ref(`users/${currentUser.phone}/online`);
            const myLastSeenRef = db.ref(`users/${currentUser.phone}/last_seen`);
            db.ref('.info/connected').on('value', snap => {
                if(snap.val() === true) {
                    myOnlineRef.onDisconnect().set(false);
                    myLastSeenRef.onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
                    myOnlineRef.set(true);
                }
            });

            db.ref('users').on('value', snap => { 
                if(snap.exists()) usersCache = snap.val(); 
                if(usersCache[currentUser.phone] && usersCache[currentUser.phone].contacts) {
                    currentUser.contacts = usersCache[currentUser.phone].contacts;
                } else {
                    currentUser.contacts = {};
                }
                loadChats(); 
                renderContacts();
            });
        }

        function getStatusText(userPhone) {
            if(userPhone === ADMIN_PHONE && currentChatId === 'channel_framework') return 'РһС„РёСҶРёР°Р»СҢРҪСӢР№ РәР°РҪР°Р»';
            const u = usersCache[userPhone];
            if(!u) return 'РқРө РІ СҒРөСӮРё';
            if(u.online) return '<span class="text-green-500">Р’ СҒРөСӮРё</span>';
            if(!u.last_seen) return '<span class="text-gray-500">РқРө РІ СҒРөСӮРё</span>';
            const diff = Date.now() - u.last_seen;
            if(diff < 60000) return '<span class="text-yellow-500">Р‘СӢР»(Р°) СӮРҫР»СҢРәРҫ СҮСӮРҫ</span>';
            return '<span class="text-gray-500">РқРө РІ СҒРөСӮРё</span>';
        }

        // === Р§РҗРўР« Рҳ РҡРҗРқРҗРӣР« ===
        function loadChats() {
            db.ref('chats').on('value', snap => {
                const listEl = document.getElementById('chats-list'); listEl.innerHTML = '';
                
                // Р РөРҪРҙРөСҖ РҡР°РҪР°Р»Р° Framework РҙР»СҸ РІСҒРөС…
                renderChatListItem('channel_framework', { type: 'channel', name: 'Framework', emoji: 'рҹ“ў' });

                if (!snap.exists()) return;
                const chats = snap.val();
                for (let cId in chats) {
                    if (cId === 'channel_framework') continue; // РҹСҖРҫРҝСғСҒРәР°РөРј, СғР¶Рө РҙРҫРұР°РІРёР»Рё
                    const chat = chats[cId];
                    if (chat.participants && chat.participants.includes(currentUser.phone)) {
                        renderChatListItem(cId, chat);
                    }
                }
            });
        }

        function renderChatListItem(chatId, chat) {
            let name = chat.name, avatar = chat.emoji, infoText = 'Р“СҖСғРҝРҝР°';
            
            if(chat.type === 'channel') infoText = 'РһС„РёСҶРёР°Р»СҢРҪСӢР№ РәР°РҪР°Р»';
            if(chat.type === 'direct') {
                const fPhone = chat.participants.find(p => p !== currentUser.phone);
                if(usersCache[fPhone]) { name = usersCache[fPhone].nickname; avatar = usersCache[fPhone].emoji; infoText = getStatusText(fPhone); }
            }

            const div = document.createElement('div');
            div.className = `p-3 flex items-center gap-4 cursor-pointer rounded-2xl bg-dark active:bg-gray-800`;
            div.onclick = () => openChat(chatId, name, avatar, chat);
            div.innerHTML = `
                <div class="w-14 h-14 bg-[#2c2c35] rounded-full flex items-center justify-center text-3xl flex-shrink-0">${avatar}</div>
                <div class="flex-1 overflow-hidden">
                    <div class="font-bold text-[17px] truncate text-white">${name}</div>
                    <div class="text-sm truncate mt-0.5">${infoText}</div>
                </div>
            `;
            document.getElementById('chats-list').appendChild(div);
        }

        function openChat(chatId, chatName, chatAvatar, chatData) {
            currentChatId = chatId;
            document.getElementById('current-chat-name').innerText = chatName;
            document.getElementById('current-chat-avatar').innerText = chatAvatar;
            
            // РқР°СҒСӮСҖРҫР№РәР° СҲР°РҝРәРё Рё СҒРәСҖСӢСӮРёРө РҝРҫР»СҸ РІРІРҫРҙР° РҙР»СҸ РәР°РҪР°Р»Р°
            if(chatId === 'channel_framework') {
                document.getElementById('current-chat-info').innerHTML = 'РһС„РёСҶРёР°Р»СҢРҪСӢР№ РәР°РҪР°Р»';
                document.getElementById('input-area').style.display = (currentUser.phone === ADMIN_PHONE) ? 'flex' : 'none';
            } else {
                document.getElementById('input-area').style.display = 'flex';
                if(chatData.type === 'group') document.getElementById('current-chat-info').innerHTML = `${chatData.participants.length} СғСҮР°СҒСӮРҪРёРәРҫРІ &nbsp;<i class="fas fa-chevron-right text-[10px]"></i>`;
                else document.getElementById('current-chat-info').innerHTML = getStatusText(chatData.participants.find(p=>p!==currentUser.phone));
            }

            document.getElementById('active-chat-screen').classList.remove('translate-x-full');

            if(messagesListener) db.ref(messagesListener).off();
            const msgsArea = document.getElementById('messages-area'); msgsArea.innerHTML = '';
            messagesListener = `chats/${chatId}/messages`;
            
            db.ref(messagesListener).on('child_added', snap => {
                const msg = snap.val(); const msgId = snap.key;
                displayMessage(msgId, msg);
                if (msg.sender !== currentUser.phone && msg.status === 'sent') db.ref(`${messagesListener}/${msgId}`).update({ status: 'read' });
            });
            db.ref(messagesListener).on('child_changed', snap => {
                const msg = snap.val(); const statusEl = document.getElementById(`status-${snap.key}`);
                if (statusEl && msg.sender === currentUser.phone) {
                    statusEl.innerHTML = msg.status === 'read' ? '<i class="fas fa-check-double text-blue-500"></i>' : '<i class="fas fa-check text-gray-500"></i>';
                }
            });
        }

        function closeChat() {
            document.getElementById('active-chat-screen').classList.add('translate-x-full');
            currentChatId = null; if(messagesListener) db.ref(messagesListener).off();
        }

        function displayMessage(msgId, msg) {
            const isMine = msg.sender === currentUser.phone;
            const senderData = usersCache[msg.sender] || { nickname: msg.sender, emoji: 'рҹ‘Ө' };
            
            let statusHTML = '<i class="far fa-clock"></i>'; 
            if (msg.status === 'sent') statusHTML = '<i class="fas fa-check text-gray-600"></i>';
            if (msg.status === 'read') statusHTML = '<i class="fas fa-check-double text-blue-800"></i>';

            const div = document.createElement('div');
            div.className = `flex w-full ${isMine ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                ${!isMine ? `<div class="text-2xl mr-2 self-end mb-1">${senderData.emoji}</div>` : ''}
                <div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-theirs'}">
                    ${!isMine && currentChatId !== 'channel_framework' ? `<div class="text-[11px] font-bold text-gray-400 mb-1 leading-none">${senderData.nickname}</div>` : ''}
                    <div>${msg.text ? msg.text.replace(/\n/g, '<br>') : ''}</div>
                    <div class="text-[11px] ${isMine ? 'text-orange-900' : 'text-gray-400'} mt-1 flex justify-end items-center gap-1 font-medium">
                        ${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        ${isMine ? `<span id="status-${msgId}" class="ml-1">${statusHTML}</span>` : ''}
                    </div>
                </div>
            `;
            const area = document.getElementById('messages-area'); area.appendChild(div);
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            input.value = ''; input.style.height = 'auto';
            
            await db.ref(`chats/${currentChatId}/messages`).push().set({ 
                sender: currentUser.phone, text: text, timestamp: Date.now(), status: 'sent' 
            });
        }

        // === Р”Р РЈР—Р¬РҜ Рҳ РҳРқРӨРһ Рһ Р“Р РЈРҹРҹР• ===
        async function createDirectChat(forcePhone = null) {
            const phone = forcePhone || document.getElementById('new-chat-phone').value.trim();
            if(!phone || phone === currentUser.phone) return alert('РқРөРІРөСҖРҪСӢР№ РҪРҫРјРөСҖ.');
            if(!usersCache[phone]) return alert('РҹРҫР»СҢР·РҫРІР°СӮРөР»СҢ РҪРө РҪР°Р№РҙРөРҪ.');

            // Р”РҫРұР°РІР»СҸРөРј РІ РҙСҖСғР·СҢСҸ
            await db.ref(`users/${currentUser.phone}/contacts/${phone}`).set(true);
            
            // РЎРҫР·РҙР°РөРј СҮР°СӮ
            const chatId = [currentUser.phone, phone].sort().join('_');
            await db.ref('chats/' + chatId).update({ type: 'direct', participants: [currentUser.phone, phone] });
            
            hideModal('new-chat-modal'); document.getElementById('new-chat-phone').value = '';
            alert('РҹРҫР»СҢР·РҫРІР°СӮРөР»СҢ РҙРҫРұР°РІР»РөРҪ РІ РҙСҖСғР·СҢСҸ!');
        }

        function renderContacts() {
            const list = document.getElementById('contacts-list-area'); list.innerHTML = '';
            let hasFriends = false;
            for(let phone in currentUser.contacts) {
                if(!usersCache[phone]) continue;
                hasFriends = true;
                const u = usersCache[phone];
                list.innerHTML += `
                    <div class="flex items-center justify-between bg-[#2c2c35] p-3 rounded-xl mb-2">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">${u.emoji}</span>
                            <div class="flex flex-col"><span class="font-bold text-white">${u.nickname}</span><span class="text-xs ${u.online ? 'text-green-500':'text-gray-500'}">${u.online ? 'Р’ СҒРөСӮРё' : 'РһС„Р»Р°Р№РҪ'}</span></div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="createDirectChat('${phone}'); hideModal('contacts-modal')" class="text-blue-400 p-2"><i class="fas fa-comment"></i></button>
                            <button onclick="removeFriend('${phone}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            }
            if(!hasFriends) list.innerHTML = '<div class="text-center text-gray-500 mt-10">РЈ РІР°СҒ РҝРҫРәР° РҪРөСӮ РҙСҖСғР·РөР№</div>';
        }

        async function removeFriend(phone) {
            if(confirm('РЈРҙР°Р»РёСӮСҢ РёР· РҙСҖСғР·РөР№? Р§Р°СӮ РҫСҒСӮР°РҪРөСӮСҒСҸ.')) {
                await db.ref(`users/${currentUser.phone}/contacts/${phone}`).remove();
            }
        }

        function openChatInfo() {
            if(currentChatId === 'channel_framework') return; // РқРөСӮ РёРҪС„Рҫ РҙР»СҸ РәР°РҪР°Р»Р°
            
            db.ref(`chats/${currentChatId}`).once('value', snap => {
                const chat = snap.val();
                if(chat.type === 'group') {
                    const list = document.getElementById('group-members-area'); list.innerHTML = '';
                    chat.participants.forEach(phone => {
                        const u = usersCache[phone] || { nickname: 'РқРөРёР·РІРөСҒСӮРҪСӢР№', emoji: 'рҹ‘Ө' };
                        const isMe = phone === currentUser.phone;
                        const isFriend = !!currentUser.contacts[phone];
                        
                        let buttons = '';
                        if(!isMe) {
                            buttons += `<button onclick="createDirectChat('${phone}'); hideModal('group-info-modal')" class="text-blue-400 p-2 ml-2"><i class="fas fa-comment"></i></button>`;
                            if(!isFriend) buttons += `<button onclick="createDirectChat('${phone}')" class="text-green-400 p-2 ml-2" title="Р”РҫРұР°РІРёСӮСҢ РІ РҙСҖСғР·СҢСҸ"><i class="fas fa-user-plus"></i></button>`;
                        }

                        list.innerHTML += `
                            <div class="flex items-center justify-between bg-[#2c2c35] p-3 rounded-xl">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">${u.emoji}</span>
                                    <span class="font-bold text-white">${u.nickname} ${isMe ? '(Р’СӢ)' : ''}</span>
                                </div>
                                <div class="flex">${buttons}</div>
                            </div>`;
                    });
                    showModal('group-info-modal');
                }
            });
        }

        // === РЎРһР—Р”РҗРқРҳР• Р“Р РЈРҹРҹР« ===
        let selectedForGroup = [];
        function showGroupModal() {
            showModal('new-group-modal'); selectedForGroup = [];
            document.getElementById('group-count').innerText = '0';
            const list = document.getElementById('group-users-list'); list.innerHTML = '';
            
            for (let phone in currentUser.contacts) {
                const user = usersCache[phone]; if(!user) continue;
                list.innerHTML += `
                    <label class="flex items-center justify-between bg-[#2c2c35] p-4 rounded-xl mb-2">
                        <div class="flex items-center gap-3"><span class="text-2xl">${user.emoji}</span><span class="font-bold text-white">${user.nickname}</span></div>
                        <input type="checkbox" class="w-6 h-6 accent rounded-full" value="${phone}" onchange="handleGroupCheck(this)">
                    </label>`;
            }
            if(list.innerHTML === '') list.innerHTML = '<div class="text-gray-500 text-sm text-center mt-4">Р”РҫРұР°РІСҢСӮРө РҙСҖСғР·РөР№, СҮСӮРҫРұСӢ СҒРҫР·РҙР°СӮСҢ РіСҖСғРҝРҝСғ</div>';
        }

        function handleGroupCheck(cb) {
            if (cb.checked) {
                if (selectedForGroup.length >= 19) { cb.checked = false; return alert('РңР°РәСҒРёРјСғРј 20 СғСҮР°СҒСӮРҪРёРәРҫРІ'); }
                selectedForGroup.push(cb.value);
            } else { selectedForGroup = selectedForGroup.filter(p => p !== cb.value); }
            document.getElementById('group-count').innerText = selectedForGroup.length;
        }

        async function createGroupChat() {
            const name = document.getElementById('new-group-name').value.trim();
            if (!name) return alert('Р’РІРөРҙРёСӮРө РҪР°Р·РІР°РҪРёРө');
            if (selectedForGroup.length === 0) return alert('Р’СӢРұРөСҖРёСӮРө СғСҮР°СҒСӮРҪРёРәРҫРІ');
            const chatId = 'group_' + Date.now();
            await db.ref('chats/' + chatId).set({ type: 'group', name: name, emoji: selectedGroupEmoji, participants: [currentUser.phone, ...selectedForGroup] });
            hideModal('new-group-modal'); document.getElementById('new-group-name').value = '';
        }

    </script>
</body>
</html>
