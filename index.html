<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Framework</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Адаптация под мобильные устройства */
        body { 
            background-color: #0f0f13; 
            color: #e0e0e0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; /* Убирает синее выделение при нажатии на телефоне */
        }
        .bg-dark { background-color: #1c1c22; }
        .bg-darker { background-color: #121216; }
        .accent { background-color: #fca311; } 
        .accent:active { background-color: #e59400; } /* :active лучше для сенсора, чем :hover */
        
        /* Скрываем скроллбары для красоты на телефоне */
        ::-webkit-scrollbar { display: none; }
        
        .emoji-btn { transition: transform 0.1s; }
        .emoji-selected { background-color: #fca311; border-radius: 50%; color: #000; transform: scale(1.1); }
        
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; word-wrap: break-word; position: relative; font-size: 15px; }
        .msg-mine { background-color: #fca311; color: #000; border-bottom-right-radius: 4px; margin-left: auto; }
        .msg-theirs { background-color: #2c2c35; color: #fff; border-bottom-left-radius: 4px; margin-right: auto;}
        
        /* Плавные анимации переходов между экранами */
        .slide-screen { transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    </style>
</head>
<body class="h-[100dvh] w-full overflow-hidden relative">

    <div id="auth-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-darker p-4 overflow-y-auto">
        <div class="w-full max-w-sm">
            
            <div class="text-center mb-8 mt-4">
                <div class="text-6xl mb-3">💬</div>
                <h1 class="text-3xl font-black tracking-widest text-white uppercase">Framework</h1>
            </div>

            <h2 id="auth-title" class="text-xl font-bold text-center mb-6 text-gray-300">Вход</h2>
            
            <div id="error-msg" class="hidden bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-lg mb-6 text-sm text-center font-medium"></div>

            <div class="space-y-4">
                <div>
                    <input type="tel" id="phone-input" placeholder="Номер телефона (напр. 79991234567)" class="w-full bg-dark text-white p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-lg">
                </div>
                
                <div id="nickname-block" class="hidden">
                    <input type="text" id="nickname-input" placeholder="Придумайте никнейм" class="w-full bg-dark text-white p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-lg">
                </div>

                <div id="emoji-block" class="hidden">
                    <label class="block text-sm text-gray-400 mb-2 pl-1">Выберите аватар</label>
                    <div id="emoji-picker" class="flex flex-wrap gap-3 h-32 overflow-y-auto bg-dark p-3 rounded-xl justify-center">
                        </div>
                </div>

                <div class="relative">
                    <input type="password" id="password-input" placeholder="Пароль" class="w-full bg-dark text-white p-4 rounded-xl outline-none focus:ring-2 focus:ring-yellow-500 text-lg pr-12">
                    <button onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 p-2">
                        <i id="eye-icon" class="fas fa-eye text-lg"></i>
                    </button>
                </div>

                <button id="auth-btn" onclick="handleAuth()" class="w-full accent text-gray-900 font-bold p-4 rounded-xl mt-6 text-lg shadow-lg">Войти</button>
            </div>

            <div class="mt-8 text-center pb-8">
                <button onclick="toggleAuthMode()" class="text-gray-400 active:text-white p-2">
                    <span id="auth-toggle-text" class="border-b border-gray-600">Нет аккаунта? Создать</span>
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full h-full relative">
        
        <div id="chats-list-screen" class="absolute inset-0 flex flex-col bg-darker z-10 w-full h-full">
            <div class="h-16 border-b border-gray-800 bg-dark flex justify-between items-center px-4 flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div id="my-avatar" class="text-3xl bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center shadow-inner">👤</div>
                    <div class="flex flex-col">
                        <span id="my-nickname" class="font-bold text-white leading-tight">Загрузка...</span>
                        <span id="my-phone" class="text-xs text-gray-500"></span>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-500 active:text-red-400 p-2 text-xl"><i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="flex gap-2 p-3 flex-shrink-0">
                <button onclick="showModal('new-chat-modal')" class="flex-1 bg-dark active:bg-gray-800 p-3 rounded-xl text-sm font-medium border border-gray-800 text-center"><i class="fas fa-user mr-2 text-blue-400"></i>Новый чат</button>
                <button onclick="showGroupModal()" class="flex-1 bg-dark active:bg-gray-800 p-3 rounded-xl text-sm font-medium border border-gray-800 text-center"><i class="fas fa-users mr-2 text-green-400"></i>Новая группа</button>
            </div>

            <div id="chats-list" class="flex-1 overflow-y-auto px-2 pb-4">
                </div>
        </div>

        <div id="active-chat-screen" class="slide-screen absolute inset-0 flex flex-col bg-darker z-20 w-full h-full translate-x-full">
            <div class="h-16 border-b border-gray-800 bg-dark flex items-center px-2 flex-shrink-0">
                <button onclick="closeChat()" class="p-3 text-accent active:text-white flex items-center">
                    <i class="fas fa-chevron-left text-xl"></i>
                    <span class="ml-1 text-sm font-medium">Назад</span>
                </button>
                <div class="flex items-center gap-3 ml-2">
                    <div id="current-chat-avatar" class="text-2xl bg-gray-800 rounded-full w-10 h-10 flex items-center justify-center">💬</div>
                    <div class="flex flex-col">
                        <span id="current-chat-name" class="font-bold text-white leading-tight truncate max-w-[180px]">Название</span>
                        <span id="current-chat-info" class="text-xs text-gray-500">...</span>
                    </div>
                </div>
            </div>

            <div id="messages-area" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col pb-4">
                </div>

            <div class="p-3 bg-dark border-t border-gray-800 flex-shrink-0 pb-safe">
                <div class="flex gap-2 items-end">
                    <textarea id="message-input" rows="1" placeholder="Сообщение..." class="flex-1 bg-[#2c2c35] text-white px-4 py-3 rounded-2xl outline-none resize-none max-h-24 text-[15px]" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button id="send-btn" onclick="sendMessage()" class="accent w-12 h-12 rounded-full text-gray-900 flex items-center justify-center text-xl flex-shrink-0 mb-0.5 active:scale-95 transition-transform shadow-lg">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="new-chat-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-dark w-full rounded-t-2xl p-6 pb-10 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white">Новый чат</h3>
                <button onclick="hideModal('new-chat-modal')" class="text-gray-400 p-2 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <input type="tel" id="new-chat-phone" placeholder="Номер друга (7999...)" class="w-full bg-[#2c2c35] text-white p-4 rounded-xl mb-4 outline-none text-lg">
            <button onclick="createDirectChat()" class="w-full accent text-gray-900 font-bold p-4 rounded-xl text-lg shadow-lg active:scale-95 transition-transform">Создать чат</button>
        </div>
    </div>

    <div id="new-group-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-dark w-full h-[85dvh] rounded-t-2xl flex flex-col animate-slide-up">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center flex-shrink-0">
                <button onclick="hideModal('new-group-modal')" class="text-gray-400 p-2">Отмена</button>
                <h3 class="text-lg font-bold text-white">Новая группа</h3>
                <button onclick="createGroupChat()" class="text-accent font-bold p-2">Создать</button>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto">
                <input type="text" id="new-group-name" placeholder="Название группы" class="w-full bg-[#2c2c35] text-white p-4 rounded-xl mb-4 outline-none text-lg">
                
                <label class="block text-sm text-gray-400 mb-2 pl-1">Иконка группы</label>
                <div id="group-emoji-picker" class="flex overflow-x-auto gap-2 bg-[#2c2c35] p-2 rounded-xl mb-6 pb-3">
                    </div>

                <div class="flex justify-between items-end mb-2 pl-1">
                    <span class="text-sm text-gray-400">Участники</span>
                    <span class="text-xs font-bold text-accent"><span id="group-count">0</span>/19</span>
                </div>
                
                <div id="group-users-list" class="space-y-2 pb-10">
                    </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); } /* Для iPhone с "челкой" */
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        /* ================= НАСТРОЙКИ FIREBASE ================= */
        const firebaseConfig = {
            apiKey: "AIzaSyCqKZrJNcy-4hgZlkXbtLjBfTxY5I4-N7o",
            authDomain: "framework-5a0bf.firebaseapp.com",
            databaseURL: "https://framework-5a0bf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "framework-5a0bf",
            storageBucket: "framework-5a0bf.firebasestorage.app",
            messagingSenderId: "101596985169",
            appId: "1:101596985169:web:3474135d7496f5fa314570"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        /* ================= ПЕРЕМЕННЫЕ ================= */
        let isLoginMode = true;
        let currentUser = null;
        let currentChatId = null;
        let usersCache = {}; 
        let messagesListener = null;

        const emojis = ['😀','😃','🤣','😇','🥰','🤑','🤔','🤐','🥶','🥵','🥸','🤮','🥳','😈','🤖','💩','🤡','😺','🖕','✌️','👀','🍊','🍉','🍎','🥝','🍍','🍌','🍓','🍒','🍑','🍟','🍕','🍔','🌍','🧭','🏠','✨','🎉','🎁','☢️','☯️','♈','♎','🔆','🔱','♀️','♂️','⚕️','♾️','✔️','🔰','♻️','🇩🇪','🇲🇬','🇵🇱','🇷🇴','🇸🇪','🇹🇳','🇽🇰','🇸🇩','🇲🇰','🇱🇹','🇬🇪','🇦🇪', '👥', '💬', '🔥', '🏆', '🎮', '💀', '👽', '👻'];
        let selectedEmoji = '😀';
        let selectedGroupEmoji = '👥';

        window.onload = () => {
            renderEmojis();
            checkSession();
        };

        /* ================= АВТОРИЗАЦИЯ ================= */
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3500);
        }

        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text'; icon.className = 'fas fa-eye-slash text-lg';
            } else {
                input.type = 'password'; icon.className = 'fas fa-eye text-lg';
            }
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Вход' : 'Регистрация';
            document.getElementById('auth-btn').innerText = isLoginMode ? 'Войти' : 'Создать аккаунт';
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? 'Нет аккаунта? Создать' : 'Уже есть аккаунт? Войти';
            
            document.getElementById('nickname-block').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('emoji-block').style.display = isLoginMode ? 'none' : 'block';
        }

        function renderEmojis() {
            const container = document.getElementById('emoji-picker');
            container.innerHTML = emojis.map(e => `<div class="text-3xl cursor-pointer p-1 emoji-btn flex-shrink-0 ${e === selectedEmoji ? 'emoji-selected' : ''}" onclick="selectEmoji('${e}', this)">${e}</div>`).join('');
        }

        function selectEmoji(e, element) {
            selectedEmoji = e;
            document.querySelectorAll('#emoji-picker .emoji-btn').forEach(btn => btn.classList.remove('emoji-selected'));
            element.classList.add('emoji-selected');
        }

        function renderGroupEmojis() {
            const container = document.getElementById('group-emoji-picker');
            container.innerHTML = emojis.map(e => `<div class="text-3xl cursor-pointer p-1 emoji-btn flex-shrink-0 ${e === selectedGroupEmoji ? 'emoji-selected' : ''}" onclick="selectGroupEmoji('${e}', this)">${e}</div>`).join('');
        }

        function selectGroupEmoji(e, element) {
            selectedGroupEmoji = e;
            document.querySelectorAll('#group-emoji-picker .emoji-btn').forEach(btn => btn.classList.remove('emoji-selected'));
            element.classList.add('emoji-selected');
        }

        function checkSession() {
            const saved = localStorage.getItem('framework_user_m');
            if (saved) { currentUser = JSON.parse(saved); startApp(); }
        }

        async function handleAuth() {
            const phone = document.getElementById('phone-input').value.trim();
            const password = document.getElementById('password-input').value.trim();

            if (!phone || !password) return showError('Заполните все поля');

            const btn = document.getElementById('auth-btn');
            btn.disabled = true; btn.innerText = 'Загрузка...';

            try {
                if (isLoginMode) {
                    const snap = await db.ref('users/' + phone).once('value');
                    if (!snap.exists()) { btn.disabled = false; btn.innerText = 'Войти'; return showError('Пользователь не найден'); }
                    const data = snap.val();
                    if (data.password !== password) { btn.disabled = false; btn.innerText = 'Войти'; return showError('Неверный пароль'); }
                    currentUser = data;
                } else {
                    const nickname = document.getElementById('nickname-input').value.trim();
                    if (!nickname) { btn.disabled = false; btn.innerText = 'Создать аккаунт'; return showError('Введите никнейм'); }
                    const snap = await db.ref('users/' + phone).once('value');
                    if (snap.exists()) { btn.disabled = false; btn.innerText = 'Создать аккаунт'; return showError('Номер уже занят'); }

                    currentUser = { phone, nickname, password, emoji: selectedEmoji };
                    await db.ref('users/' + phone).set(currentUser);
                }
                localStorage.setItem('framework_user_m', JSON.stringify(currentUser));
                startApp();
            } catch (e) {
                showError('Ошибка соединения');
                btn.disabled = false; btn.innerText = isLoginMode ? 'Войти' : 'Создать аккаунт';
            }
        }

        function logout() { localStorage.removeItem('framework_user_m'); location.reload(); }

        /* ================= РАБОТА ПРИЛОЖЕНИЯ ================= */
        function startApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('my-avatar').innerText = currentUser.emoji || '👤';
            document.getElementById('my-nickname').innerText = currentUser.nickname;
            document.getElementById('my-phone').innerText = '+' + currentUser.phone;

            db.ref('users').on('value', snap => { if(snap.exists()) usersCache = snap.val(); loadChats(); });
        }

        function loadChats() {
            db.ref('chats').on('value', snap => {
                const listEl = document.getElementById('chats-list');
                listEl.innerHTML = '';
                if (!snap.exists()) return;

                const chats = snap.val();
                for (let chatId in chats) {
                    const chat = chats[chatId];
                    if (chat.participants && chat.participants.includes(currentUser.phone)) {
                        renderChatListItem(chatId, chat);
                    }
                }
            });
        }

        function renderChatListItem(chatId, chat) {
            let chatName = chat.type === 'group' ? chat.name : 'Неизвестный';
            let chatAvatar = chat.type === 'group' ? (chat.emoji || '👥') : '👤';

            if (chat.type === 'direct') {
                const friendPhone = chat.participants.find(p => p !== currentUser.phone);
                if (friendPhone && usersCache[friendPhone]) {
                    chatName = usersCache[friendPhone].nickname;
                    chatAvatar = usersCache[friendPhone].emoji;
                } else { chatName = '+' + friendPhone; }
            }

            const div = document.createElement('div');
            // Увеличили padding для удобства тапа
            div.className = `p-4 mt-2 flex items-center gap-4 cursor-pointer rounded-2xl bg-dark active:bg-gray-800 transition-colors`;
            div.onclick = () => openChat(chatId, chatName, chatAvatar, chat);
            
            div.innerHTML = `
                <div class="w-14 h-14 bg-[#2c2c35] rounded-full flex items-center justify-center text-3xl flex-shrink-0 shadow-inner">${chatAvatar}</div>
                <div class="flex-1 overflow-hidden">
                    <div class="font-bold text-[17px] truncate text-white">${chatName}</div>
                    <div class="text-sm text-gray-400 truncate mt-0.5">${chat.type === 'group' ? 'Группа' : 'Личный чат'}</div>
                </div>
                <i class="fas fa-chevron-right text-gray-600 text-sm"></i>
            `;
            document.getElementById('chats-list').appendChild(div);
        }

        /* ================= НАВИГАЦИЯ И СООБЩЕНИЯ ================= */
        function openChat(chatId, chatName, chatAvatar, chatData) {
            currentChatId = chatId;
            
            document.getElementById('current-chat-name').innerText = chatName;
            document.getElementById('current-chat-avatar').innerText = chatAvatar;
            document.getElementById('current-chat-info').innerText = chatData.type === 'group' ? `${chatData.participants.length} участников` : 'В сети';

            // Выдвигаем экран чата (Анимация мобильного приложения)
            document.getElementById('active-chat-screen').classList.remove('translate-x-full');

            if(messagesListener) db.ref(messagesListener).off();
            const msgsArea = document.getElementById('messages-area');
            msgsArea.innerHTML = '';
            
            messagesListener = `chats/${chatId}/messages`;
            
            db.ref(messagesListener).on('child_added', snap => {
                const msg = snap.val(); const msgId = snap.key;
                displayMessage(msgId, msg);
                if (msg.sender !== currentUser.phone && msg.status === 'sent') db.ref(`${messagesListener}/${msgId}`).update({ status: 'read' });
            });

            db.ref(messagesListener).on('child_changed', snap => {
                const msg = snap.val(); const statusEl = document.getElementById(`status-${snap.key}`);
                if (statusEl && msg.sender === currentUser.phone) {
                    statusEl.innerHTML = msg.status === 'read' ? '<i class="fas fa-check-double text-blue-800"></i>' : '<i class="fas fa-check text-gray-800"></i>';
                }
            });
        }

        function closeChat() {
            // Задвигаем экран чата обратно
            document.getElementById('active-chat-screen').classList.add('translate-x-full');
            currentChatId = null;
            if(messagesListener) db.ref(messagesListener).off();
        }

        function displayMessage(msgId, msg) {
            const isMine = msg.sender === currentUser.phone;
            const senderData = usersCache[msg.sender] || { nickname: msg.sender, emoji: '👤' };
            
            let statusHTML = '<i class="far fa-clock"></i>'; 
            if (msg.status === 'sent') statusHTML = '<i class="fas fa-check text-gray-800"></i>';
            if (msg.status === 'read') statusHTML = '<i class="fas fa-check-double text-blue-800"></i>';

            const div = document.createElement('div');
            div.className = `flex w-full ${isMine ? 'justify-end' : 'justify-start'}`;
            
            div.innerHTML = `
                ${!isMine && senderData ? `<div class="text-2xl mr-2 self-end mb-1">${senderData.emoji}</div>` : ''}
                <div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-theirs'}">
                    ${!isMine ? `<div class="text-[11px] font-bold text-gray-400 mb-1 leading-none">${senderData.nickname}</div>` : ''}
                    <div>${msg.text.replace(/\n/g, '<br>')}</div>
                    <div class="text-[11px] ${isMine ? 'text-orange-900' : 'text-gray-400'} mt-1 flex justify-end items-center gap-1 font-medium">
                        ${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        ${isMine ? `<span id="status-${msgId}" class="ml-1">${statusHTML}</span>` : ''}
                    </div>
                </div>
            `;
            
            const area = document.getElementById('messages-area');
            area.appendChild(div);
            // Прокрутка вниз
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            input.value = '';
            input.style.height = 'auto'; // Сброс высоты поля
            const msgRef = db.ref(`chats/${currentChatId}/messages`).push();
            
            await msgRef.set({ sender: currentUser.phone, text: text, timestamp: Date.now(), status: 'sent' });
        }

        /* ================= МОДАЛКИ (НОВЫЙ ЧАТ И ГРУППА) ================= */
        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        function showGroupModal() {
            showModal('new-group-modal');
            selectedGroupEmoji = '👥'; 
            renderGroupEmojis(); loadUsersForGroup();
        }

        async function createDirectChat() {
            const phone = document.getElementById('new-chat-phone').value.trim();
            if(!phone || phone === currentUser.phone) return alert('Неверный номер.');
            const snap = await db.ref('users/' + phone).once('value');
            if(!snap.exists()) return alert('Пользователь не найден.');

            const chatId = [currentUser.phone, phone].sort().join('_');
            await db.ref('chats/' + chatId).update({ type: 'direct', participants: [currentUser.phone, phone] });
            hideModal('new-chat-modal'); document.getElementById('new-chat-phone').value = '';
        }

        let selectedForGroup = [];

        function loadUsersForGroup() {
            selectedForGroup = []; document.getElementById('group-count').innerText = '0';
            const list = document.getElementById('group-users-list'); list.innerHTML = '';

            for (let phone in usersCache) {
                if (phone === currentUser.phone) continue; 
                const user = usersCache[phone];
                const div = document.createElement('label');
                div.className = 'flex items-center justify-between bg-[#2c2c35] p-4 rounded-xl active:bg-gray-700 cursor-pointer';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${user.emoji}</span>
                        <div class="flex flex-col">
                            <span class="font-bold text-white text-[15px]">${user.nickname}</span>
                            <span class="text-xs text-gray-500">+${phone}</span>
                        </div>
                    </div>
                    <input type="checkbox" class="w-6 h-6 accent rounded-full cursor-pointer" value="${phone}" onchange="handleGroupCheck(this)">
                `;
                list.appendChild(div);
            }
            if(list.innerHTML === '') list.innerHTML = '<div class="text-gray-500 text-sm text-center mt-4">Нет доступных контактов</div>';
        }

        function handleGroupCheck(cb) {
            if (cb.checked) {
                if (selectedForGroup.length >= 19) { cb.checked = false; alert('Максимум 20 участников'); return; }
                selectedForGroup.push(cb.value);
            } else { selectedForGroup = selectedForGroup.filter(p => p !== cb.value); }
            document.getElementById('group-count').innerText = selectedForGroup.length;
        }

        async function createGroupChat() {
            const name = document.getElementById('new-group-name').value.trim();
            if (!name) return alert('Введите название группы');
            if (selectedForGroup.length === 0) return alert('Выберите участников');

            const chatId = 'group_' + Date.now();
            await db.ref('chats/' + chatId).set({ type: 'group', name: name, emoji: selectedGroupEmoji, participants: [currentUser.phone, ...selectedForGroup] });
            hideModal('new-group-modal'); document.getElementById('new-group-name').value = '';
        }
    </script>
</body>
</html>
